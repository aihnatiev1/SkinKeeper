appId: com.skinkeeper.desktop
productName: SkinKeeper
copyright: Copyright © 2024-2026 SkinKeeper

directories:
  output: release
  buildResources: build

files:
  - dist/main/**/*
  - node_modules/**/*
  - "!node_modules/**/README.md"
  - "!node_modules/**/CHANGELOG.md"
  - "!node_modules/**/*.ts"
  - "!node_modules/**/*.map"

extraResources:
  - from: ../web-app/.next/standalone
    to: renderer
    filter:
      - "**/*"
  - from: ../web-app/.next/static
    to: renderer/.next/static
    filter:
      - "**/*"
  - from: ../web-app/public
    to: renderer/public
    filter:
      - "**/*"

# ─── Windows ──────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  publisherName: SkinKeeper

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  artifactName: SkinKeeper-${version}-Setup.${ext}

# ─── macOS ────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  icon: build/icon.png
  category: public.app-category.utilities
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false

dmg:
  artifactName: SkinKeeper-${version}.${ext}

# ─── Linux ────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icons
  category: Utility
  artifactName: SkinKeeper-${version}.${ext}

# ─── Auto-update ──────────────────────────────────────────────────────
publish:
  provider: github
  owner: aihnatiev1
  repo: SkinKeeper
  releaseType: release
