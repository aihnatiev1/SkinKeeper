name: skin_keeper
description: CS2 Inventory & Trade Helper
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.0
  go_router: ^15.1.2
  dio: ^5.7.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.0
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  flutter_secure_storage: ^9.2.4
  app_links: ^7.0.0
  in_app_purchase: ^3.2.0
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  in_app_review: ^2.0.10
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  home_widget: ^0.7.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/splash.png

flutter_native_splash:
  fullscreen: true
  color: "#0A0E1A"
  image: assets/splash.png
  android: true
  ios: true
  android_12:
    color: "#0A0E1A"
